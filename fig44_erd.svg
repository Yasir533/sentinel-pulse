<svg width="650" height="350" viewBox="0 0 650 350" style="background-color: #f8fafc; border: 1px solid #e2e8f0; border-radius: 8px;">
      <!-- Table: User -->
      <g transform="translate(20, 20)">
        <rect x="0" y="0" width="170" height="25" fill="#1d4ed8" stroke="#1d4ed8" rx="3"/>
        <text x="85" y="17" font-family="Arial" font-size="10.5" font-weight="bold" fill="#ffffff" text-anchor="middle">users (User)</text>
        <rect x="0" y="25" width="170" height="95" fill="#ffffff" stroke="#1d4ed8" rx="3"/>
        <text x="8" y="42" font-family="Arial" font-size="9.5" font-weight="bold">id : Integer [PK]</text>
        <text x="8" y="60" font-family="Arial" font-size="9">username : String</text>
        <text x="8" y="78" font-family="Arial" font-size="9">email : String</text>
        <text x="8" y="96" font-family="Arial" font-size="9">password_hash : String</text>
        <text x="8" y="112" font-family="Arial" font-size="9">role : String</text>
      </g>
      
      <!-- Table: MobileSubmission -->
      <g transform="translate(240, 20)">
        <rect x="0" y="0" width="190" height="25" fill="#059669" stroke="#059669" rx="3"/>
        <text x="95" y="17" font-family="Arial" font-size="10.5" font-weight="bold" fill="#ffffff" text-anchor="middle">mobile_submissions</text>
        <rect x="0" y="25" width="190" height="150" fill="#ffffff" stroke="#059669" rx="3"/>
        <text x="8" y="42" font-family="Arial" font-size="9.5" font-weight="bold">id : Integer [PK]</text>
        <text x="8" y="60" font-family="Arial" font-size="9">user_id : Integer [FK]</text>
        <text x="8" y="78" font-family="Arial" font-size="9">submission_type : String</text>
        <text x="8" y="96" font-family="Arial" font-size="9">content : Text</text>
        <text x="8" y="114" font-family="Arial" font-size="9">risk_score : Integer</text>
        <text x="8" y="132" font-family="Arial" font-size="9">verdict : String</text>
        <text x="8" y="150" font-family="Arial" font-size="9">threat_category : String</text>
        <text x="8" y="168" font-family="Arial" font-size="9">created_at : DateTime</text>
      </g>

      <!-- Table: ThreatIntel -->
      <g transform="translate(20, 190)">
        <rect x="0" y="0" width="170" height="25" fill="#d97706" stroke="#d97706" rx="3"/>
        <text x="85" y="17" font-family="Arial" font-size="10.5" font-weight="bold" fill="#ffffff" text-anchor="middle">threat_intel</text>
        <rect x="0" y="25" width="170" height="110" fill="#ffffff" stroke="#d97706" rx="3"/>
        <text x="8" y="42" font-family="Arial" font-size="9.5" font-weight="bold">id : Integer [PK]</text>
        <text x="8" y="60" font-family="Arial" font-size="9">intel_type : String</text>
        <text x="8" y="78" font-family="Arial" font-size="9">intel_value : String</text>
        <text x="8" y="96" font-family="Arial" font-size="9">classification : String</text>
        <text x="8" y="114" font-family="Arial" font-size="9">mitre_tactic : String</text>
        <text x="8" y="128" font-family="Arial" font-size="9">created_at : DateTime</text>
      </g>

      <!-- Table: Threat -->
      <g transform="translate(470, 20)">
        <rect x="0" y="0" width="160" height="25" fill="#0891b2" stroke="#0891b2" rx="3"/>
        <text x="80" y="17" font-family="Arial" font-size="10.5" font-weight="bold" fill="#ffffff" text-anchor="middle">threats (IOCs)</text>
        <rect x="0" y="25" width="160" height="130" fill="#ffffff" stroke="#0891b2" rx="3"/>
        <text x="8" y="42" font-family="Arial" font-size="9.5" font-weight="bold">id : Integer [PK]</text>
        <text x="8" y="60" font-family="Arial" font-size="9">threat_type : String</text>
        <text x="8" y="78" font-family="Arial" font-size="9">ioc_type : String</text>
        <text x="8" y="96" font-family="Arial" font-size="9">ioc_value : String</text>
        <text x="8" y="114" font-family="Arial" font-size="9">severity : String</text>
        <text x="8" y="132" font-family="Arial" font-size="9">source : String</text>
        <text x="8" y="148" font-family="Arial" font-size="9">created_by : Integer [FK]</text>
      </g>

      <!-- Relationships Connectors -->
      <!-- User to MobileSubmission (One-to-Many) -->
      <line x1="190" y1="80" x2="240" y2="80" stroke="#475569" stroke-width="1.5"/>
      <circle cx="195" cy="80" r="3" fill="#475569"/>
      <line x1="230" y1="75" x2="240" y2="80" stroke="#475569" stroke-width="1.5"/>
      <line x1="230" y1="85" x2="240" y2="80" stroke="#475569" stroke-width="1.5"/>

      <!-- User to Threat (One-to-Many) -->
      <path d="M 105,140 L 105,175 L 550,175 L 550,150" fill="none" stroke="#475569" stroke-width="1.5"/>
      <circle cx="105" cy="145" r="3" fill="#475569"/>
    </svg>