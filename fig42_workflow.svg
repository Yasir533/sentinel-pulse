<svg width="650" height="340" viewBox="0 0 650 340" style="background-color: #f8fafc; border: 1px solid #e2e8f0; border-radius: 8px;">
      <defs>
        <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
          <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155" />
        </marker>
        <marker id="dashed-arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
          <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748b" />
        </marker>
      </defs>
      
      <!-- Sequence Columns / Participants -->
      <!-- Smartphone -->
      <rect x="20" y="10" width="100" height="35" rx="5" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5"/>
      <text x="70" y="32" font-family="Arial" font-size="10" font-weight="bold" fill="#1e40af" text-anchor="middle">Smartphone User</text>
      <line x1="70" y1="45" x2="70" y2="300" stroke="#94a3b8" stroke-dasharray="4,4"/>
      
      <!-- Ingestion Web Console -->
      <rect x="150" y="10" width="120" height="35" rx="5" fill="#cffafe" stroke="#0891b2" stroke-width="1.5"/>
      <text x="210" y="32" font-family="Arial" font-size="10" font-weight="bold" fill="#155e75" text-anchor="middle">Ingestion Console</text>
      <line x1="210" y1="45" x2="210" y2="300" stroke="#94a3b8" stroke-dasharray="4,4"/>
      
      <!-- AI Heuristics -->
      <rect x="300" y="10" width="120" height="35" rx="5" fill="#d1fae5" stroke="#059669" stroke-width="1.5"/>
      <text x="360" y="32" font-family="Arial" font-size="10" font-weight="bold" fill="#065f46" text-anchor="middle">AI Heuristics Engine</text>
      <line x1="360" y1="45" x2="360" y2="300" stroke="#94a3b8" stroke-dasharray="4,4"/>
      
      <!-- Database Core -->
      <rect x="440" y="10" width="100" height="35" rx="5" fill="#f3e8ff" stroke="#7c3aed" stroke-width="1.5"/>
      <text x="490" y="32" font-family="Arial" font-size="10" font-weight="bold" fill="#5b21b6" text-anchor="middle">SQLite Database</text>
      <line x1="490" y1="45" x2="490" y2="300" stroke="#94a3b8" stroke-dasharray="4,4"/>
      
      <!-- Alert Console -->
      <rect x="560" y="10" width="80" height="35" rx="5" fill="#fee2e2" stroke="#dc2626" stroke-width="1.5"/>
      <text x="600" y="32" font-family="Arial" font-size="10" font-weight="bold" fill="#991b1b" text-anchor="middle">SOC pipeline</text>
      <line x1="600" y1="45" x2="600" y2="300" stroke="#94a3b8" stroke-dasharray="4,4"/>
      
      <!-- Flows -->
      <!-- 1. Submit Threat -->
      <g>
        <line x1="70" y1="75" x2="210" y2="75" stroke="#334155" stroke-width="1.5" marker-end="url(#arrow)"/>
        <text x="140" y="68" font-family="Arial" font-size="9" font-weight="bold" fill="#334155" text-anchor="middle">1. Submits threat snippet</text>
      </g>
      
      <!-- 2. Scan content -->
      <g>
        <line x1="210" y1="110" x2="360" y2="110" stroke="#334155" stroke-width="1.5" marker-end="url(#arrow)"/>
        <text x="285" y="103" font-family="Arial" font-size="9" font-weight="bold" fill="#334155" text-anchor="middle">2. Triggers scan & heuristics</text>
      </g>
      
      <!-- 3. Cache/Check repetition -->
      <g>
        <path d="M 360,135 C 390,135 390,155 365,155" fill="none" stroke="#059669" stroke-width="1.5" marker-end="url(#arrow)"/>
        <text x="430" y="148" font-family="Arial" font-size="8.5" fill="#065f46">3. Correlates repeats</text>
      </g>
      
      <!-- 4. Save MobileSubmission -->
      <g>
        <line x1="360" y1="185" x2="490" y2="185" stroke="#334155" stroke-width="1.5" marker-end="url(#arrow)"/>
        <text x="425" y="178" font-family="Arial" font-size="9" font-weight="bold" fill="#334155" text-anchor="middle">4. Writes MobileSubmission</text>
      </g>
      
      <!-- 5. Trigger Threat / Alert (Alt loop) -->
      <g>
        <line x1="360" y1="225" x2="600" y2="225" stroke="#dc2626" stroke-width="1.5" marker-end="url(#arrow)"/>
        <text x="480" y="218" font-family="Arial" font-size="9" font-weight="bold" fill="#b91c1c" text-anchor="middle">5. [Risk >= 35] Dispatches Alert</text>
      </g>
      
      <!-- 6. Display Verdict -->
      <g>
        <line x1="210" y1="270" x2="70" y2="270" stroke="#64748b" stroke-width="1.2" stroke-dasharray="3,3" marker-end="url(#dashed-arrow)"/>
        <text x="140" y="263" font-family="Arial" font-size="9" fill="#475569" text-anchor="middle">6. Displays verdict & guidance</text>
      </g>
    </svg>