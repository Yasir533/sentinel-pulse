<svg width="650" height="320" viewBox="0 0 650 320" style="background-color: #f8fafc; border: 1px solid #e2e8f0; border-radius: 8px;">
      <!-- Definition of arrow markers -->
      <defs>
        <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
          <path d="M 0 0 L 10 5 L 0 10 z" fill="#475569" />
        </marker>
      </defs>
      
      <!-- Nodes / Blocks -->
      <!-- User Node -->
      <rect x="20" y="120" width="120" height="60" rx="25" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
      <text x="80" y="145" font-family="Arial" font-size="11" font-weight="bold" fill="#1e40af" text-anchor="middle">Smartphone</text>
      <text x="80" y="160" font-family="Arial" font-size="10" fill="#1e40af" text-anchor="middle">User / Endpoint</text>
      
      <!-- Ingestion Web Console -->
      <rect x="190" y="120" width="130" height="60" rx="8" fill="#cffafe" stroke="#0891b2" stroke-width="2"/>
      <text x="255" y="145" font-family="Arial" font-size="11" font-weight="bold" fill="#155e75" text-anchor="middle">Web Console</text>
      <text x="255" y="160" font-family="Arial" font-size="9" fill="#155e75" text-anchor="middle">/mobile/submit</text>
      
      <!-- AI Scam Heuristic Engine -->
      <rect x="370" y="120" width="140" height="60" rx="8" fill="#d1fae5" stroke="#059669" stroke-width="2"/>
      <text x="440" y="145" font-family="Arial" font-size="11" font-weight="bold" fill="#065f46" text-anchor="middle">AI Scam Analyzer</text>
      <text x="440" y="160" font-family="Arial" font-size="10" fill="#065f46" text-anchor="middle">Heuristics Engine</text>
      
      <!-- VirusTotal / AbuseIPDB APIs -->
      <rect x="370" y="20" width="140" height="50" rx="8" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
      <text x="440" y="42" font-family="Arial" font-size="10" font-weight="bold" fill="#78350f" text-anchor="middle">VirusTotal & IPDB</text>
      <text x="440" y="55" font-family="Arial" font-size="9" fill="#78350f" text-anchor="middle">Reputation APIs</text>
      
      <!-- Core DB -->
      <rect x="370" y="230" width="140" height="60" rx="15" fill="#f3e8ff" stroke="#7c3aed" stroke-width="2"/>
      <text x="440" y="258" font-family="Arial" font-size="11" font-weight="bold" fill="#5b21b6" text-anchor="middle">SQLite DB</text>
      <text x="440" y="272" font-family="Arial" font-size="9" fill="#5b21b6" text-anchor="middle">(mobile_submissions)</text>
      
      <!-- Analyst Dashboard -->
      <rect x="560" y="120" width="70" height="60" rx="8" fill="#fee2e2" stroke="#dc2626" stroke-width="2"/>
      <text x="595" y="148" font-family="Arial" font-size="11" font-weight="bold" fill="#991b1b" text-anchor="middle">SOC</text>
      <text x="595" y="162" font-family="Arial" font-size="9" fill="#991b1b" text-anchor="middle">Dashboard</text>
      
      <!-- Connectors / Arrows -->
      <line x1="140" y1="150" x2="190" y2="150" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
      <line x1="320" y1="150" x2="370" y2="150" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
      
      <line x1="440" y1="120" x2="440" y2="70" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
      <line x1="440" y1="180" x2="440" y2="230" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
      <line x1="510" y1="150" x2="560" y2="150" stroke="#ef4444" stroke-width="2" marker-end="url(#arrow)"/>
    </svg>