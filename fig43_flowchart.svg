<svg width="600" height="420" viewBox="0 0 600 420" style="background-color: #f8fafc; border: 1px solid #e2e8f0; border-radius: 8px;">
      <defs>
        <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
          <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155" />
        </marker>
      </defs>
      
      <!-- Start Node -->
      <rect x="235" y="10" width="130" height="35" rx="15" fill="#e2e8f0" stroke="#475569" stroke-width="1.5"/>
      <text x="300" y="32" font-family="Arial" font-size="10" font-weight="bold" fill="#334155" text-anchor="middle">Receive Input</text>
      <line x1="300" y1="45" x2="300" y2="70" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>
      
      <!-- Clean & Normalize -->
      <rect x="210" y="70" width="180" height="40" rx="4" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5"/>
      <text x="300" y="94" font-family="Arial" font-size="10.5" font-weight="bold" fill="#1e40af" text-anchor="middle">Clean Text & Normalize Case</text>
      <line x1="300" y1="110" x2="300" y2="135" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>
      
      <!-- Correlation Check -->
      <polygon points="300,135 410,165 300,195 190,165" fill="#fef3c7" stroke="#d97706" stroke-width="1.5"/>
      <text x="300" y="169" font-family="Arial" font-size="9" font-weight="bold" fill="#78350f" text-anchor="middle">Is Flagged in Cache?</text>
      
      <!-- Flows from decision -->
      <line x1="410" y1="165" x2="480" y2="165" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>
      <text x="440" y="157" font-family="Arial" font-size="9.5" fill="#334155">Yes</text>
      
      <line x1="300" y1="195" x2="300" y2="230" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>
      <text x="308" y="210" font-family="Arial" font-size="9.5" fill="#334155">No</text>
      
      <!-- Correlated Score add -->
      <rect x="480" y="145" width="100" height="40" rx="4" fill="#fee2e2" stroke="#dc2626" stroke-width="1.5"/>
      <text x="530" y="169" font-family="Arial" font-size="10" font-weight="bold" fill="#991b1b" text-anchor="middle">Add +40 Risk</text>
      
      <!-- Heuristics Scans block -->
      <rect x="200" y="230" width="200" height="40" rx="4" fill="#d1fae5" stroke="#059669" stroke-width="1.5"/>
      <text x="300" y="254" font-family="Arial" font-size="10.5" font-weight="bold" fill="#065f46" text-anchor="middle">Evaluate Scam Keyword Filters</text>
      
      <line x1="530" y1="185" x2="530" y2="300" stroke="#475569" stroke-width="1.5"/>
      <line x1="530" y1="300" x2="300" y2="300" stroke="#475569" stroke-width="1.5"/>
      <line x1="300" y1="270" x2="300" y2="330" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>
      
      <!-- Determine Verdict -->
      <rect x="200" y="330" width="200" height="45" rx="6" fill="#f3e8ff" stroke="#7c3aed" stroke-width="1.5"/>
      <text x="300" y="357" font-family="Arial" font-size="11" font-weight="bold" fill="#5b21b6" text-anchor="middle">Map Score to Verdict State</text>
      <line x1="300" y1="375" x2="300" y2="390" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>
      
      <!-- Outputs -->
      <rect x="235" y="390" width="130" height="25" rx="5" fill="#e2e8f0" stroke="#475569" stroke-width="1"/>
      <text x="300" y="406" font-family="Arial" font-size="9" fill="#334155" text-anchor="middle">Output Result</text>
    </svg>