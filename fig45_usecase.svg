<svg width="600" height="320" viewBox="0 0 600 320" style="background-color: #f8fafc; border: 1px solid #e2e8f0; border-radius: 8px;">
      <!-- Actor: Smartphone User -->
      <g transform="translate(40, 90)">
        <circle cx="20" cy="20" r="12" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
        <line x1="20" y1="32" x2="20" y2="70" stroke="#2563eb" stroke-width="2"/>
        <line x1="5" y1="45" x2="35" y2="45" stroke="#2563eb" stroke-width="2"/>
        <line x1="20" y1="70" x2="5" y2="100" stroke="#2563eb" stroke-width="2"/>
        <line x1="20" y1="70" x2="35" y2="100" stroke="#2563eb" stroke-width="2"/>
        <text x="20" y="115" font-family="Arial" font-size="10" font-weight="bold" fill="#1e40af" text-anchor="middle">Smartphone User</text>
      </g>
      
      <!-- System Boundaries & Use Cases -->
      <rect x="160" y="20" width="280" height="280" rx="10" fill="#ffffff" stroke="#94a3b8" stroke-width="2"/>
      <text x="300" y="40" font-family="Arial" font-size="11" font-weight="bold" fill="#475569" text-anchor="middle">Sentinel Pulse Platform</text>
      
      <g transform="translate(180, 60)">
        <ellipse cx="120" cy="25" rx="90" ry="20" fill="#f8fafc" stroke="#475569" stroke-width="1.5"/>
        <text x="120" y="28" font-family="Arial" font-size="9.5" fill="#334155" text-anchor="middle">Submit Threat Text / Links</text>
      </g>
      
      <g transform="translate(180, 115)">
        <ellipse cx="120" cy="25" rx="90" ry="20" fill="#f8fafc" stroke="#475569" stroke-width="1.5"/>
        <text x="120" y="28" font-family="Arial" font-size="9.5" fill="#334155" text-anchor="middle">Scan SMS & URL Vectors</text>
      </g>
      
      <g transform="translate(180, 170)">
        <ellipse cx="120" cy="25" rx="90" ry="20" fill="#f8fafc" stroke="#475569" stroke-width="1.5"/>
        <text x="120" y="28" font-family="Arial" font-size="9.5" fill="#334155" text-anchor="middle">Inspect Observability Dashboard</text>
      </g>
      
      <g transform="translate(180, 225)">
        <ellipse cx="120" cy="25" rx="90" ry="20" fill="#f8fafc" stroke="#475569" stroke-width="1.5"/>
        <text x="120" y="28" font-family="Arial" font-size="9.5" fill="#334155" text-anchor="middle">Perform Threat Intel Lookup</text>
      </g>

      <!-- Actor: Security Analyst -->
      <g transform="translate(520, 90)">
        <circle cx="20" cy="20" r="12" fill="#fee2e2" stroke="#dc2626" stroke-width="2"/>
        <line x1="20" y1="32" x2="20" y2="70" stroke="#dc2626" stroke-width="2"/>
        <line x1="5" y1="45" x2="35" y2="45" stroke="#dc2626" stroke-width="2"/>
        <line x1="20" y1="70" x2="5" y2="100" stroke="#dc2626" stroke-width="2"/>
        <line x1="20" y1="70" x2="35" y2="100" stroke="#dc2626" stroke-width="2"/>
        <text x="20" y="115" font-family="Arial" font-size="10" font-weight="bold" fill="#991b1b" text-anchor="middle">Security Analyst</text>
      </g>
      
      <!-- Association Lines -->
      <line x1="95" y1="120" x2="190" y2="85" stroke="#2563eb" stroke-width="1.2"/>
      <line x1="95" y1="140" x2="190" y2="135" stroke="#2563eb" stroke-width="1.2"/>
      <line x1="505" y1="140" x2="410" y2="185" stroke="#dc2626" stroke-width="1.2"/>
      <line x1="505" y1="150" x2="410" y2="235" stroke="#dc2626" stroke-width="1.2"/>
    </svg>