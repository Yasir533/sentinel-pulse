{% if recent_notifications %}
    {% for notif in recent_notifications %}
    <div class="list-group-item bg-transparent text-light border-secondary-subtle px-3 py-2.5 notification-item-widget {% if notif.status == 'Unread' %}unread-highlight{% endif %}" style="border-radius: 0 !important;">
        <div class="d-flex align-items-start gap-2">
            <span class="text-{{ notif.color_class }} mt-0.5"><i class="bi {{ notif.icon_class }} fs-6"></i></span>
            <div class="flex-grow-1 min-w-0">
                <div class="d-flex justify-content-between align-items-center mb-0.5">
                    <a href="{{ notif.link_url }}" class="fw-semibold text-light text-decoration-none small text-truncate d-block font-outfit" style="max-width: 150px;">{{ notif.title }}</a>
                    <span class="badge bg-{{ notif.priority_class }} text-dark" style="font-size: 0.6rem;">{{ notif.priority }}</span>
                </div>
                <p class="text-secondary mb-1 text-truncate-2 small" style="font-size: 0.72rem; line-height: 1.2; white-space: normal;">{{ notif.message }}</p>
                <div class="d-flex justify-content-between align-items-center">
                    <span class="text-muted" style="font-size: 0.65rem;">{{ notif.relative_time }}</span>
                    {% if notif.status == 'Unread' %}
                    <span class="unread-dot bg-danger d-inline-block rounded-circle" style="width: 6px; height: 6px;"></span>
                    {% endif %}
                </div>
            </div>
        </div>
    </div>
    {% endfor %}
{% else %}
    <div class="text-center py-4 text-muted small">No notifications available.</div>
{% endif %}
