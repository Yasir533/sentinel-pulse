<svg width="600" height="200" viewBox="0 0 600 200" style="background-color: #f8fafc; border: 1px solid #e2e8f0; border-radius: 8px;">
      <defs>
        <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
          <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155" />
        </marker>
      </defs>
      <!-- extensions.py Box -->
      <rect x="20" y="50" width="150" height="90" rx="8" fill="#d1fae5" stroke="#059669" stroke-width="2"/>
      <text x="95" y="75" font-family="Arial" font-size="11" font-weight="bold" fill="#065f46" text-anchor="middle">extensions.py</text>
      <text x="95" y="95" font-family="Arial" font-size="9" fill="#065f46" text-anchor="middle">db, login_mgr, jwt</text>
      <text x="95" y="112" font-family="Arial" font-size="9" fill="#065f46" text-anchor="middle">cors, celery registries</text>
      
      <!-- Arrow to initialize -->
      <line x1="170" y1="95" x2="230" y2="95" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>
      <text x="200" y="85" font-family="Arial" font-size="9" fill="#334155" text-anchor="middle">Imports</text>

      <!-- __init__.py Box -->
      <rect x="230" y="50" width="160" height="90" rx="8" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
      <text x="310" y="75" font-family="Arial" font-size="11" font-weight="bold" fill="#1e40af" text-anchor="middle">__init__.py</text>
      <text x="310" y="95" font-family="Arial" font-size="10" fill="#1e40af" text-anchor="middle">create_app()</text>
      <text x="310" y="115" font-family="Arial" font-size="9" font-style="italic" fill="#1e40af" text-anchor="middle">Application Factory</text>

      <!-- Arrow to bind -->
      <line x1="390" y1="95" x2="450" y2="95" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>
      <text x="420" y="85" font-family="Arial" font-size="9" fill="#334155" text-anchor="middle">Instantiates</text>

      <!-- Flask App Instance Box -->
      <rect x="450" y="50" width="130" height="90" rx="8" fill="#f3e8ff" stroke="#7c3aed" stroke-width="2"/>
      <text x="515" y="80" font-family="Arial" font-size="11" font-weight="bold" fill="#5b21b6" text-anchor="middle">Flask App</text>
      <text x="515" y="100" font-family="Arial" font-size="9" fill="#5b21b6" text-anchor="middle">Bound Context</text>
      <text x="515" y="115" font-family="Arial" font-size="9" fill="#5b21b6" text-anchor="middle">(gunicorn / run.py)</text>
    </svg>