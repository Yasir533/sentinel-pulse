<svg width="600" height="280" viewBox="0 0 600 280" style="background-color: #f8fafc; border: 1px solid #e2e8f0; border-radius: 8px;">
      <defs>
        <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
          <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155" />
        </marker>
      </defs>
      
      <!-- Start Circle -->
      <circle cx="40" cy="140" r="10" fill="#000000"/>
      <line x1="50" y1="140" x2="90" y2="140" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>
      
      <!-- Receive Submission -->
      <rect x="90" y="110" width="130" height="60" rx="8" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5"/>
      <text x="155" y="137" font-family="Arial" font-size="10" font-weight="bold" fill="#1e40af" text-anchor="middle">Receive Ingested</text>
      <text x="155" y="152" font-family="Arial" font-size="9.5" fill="#1e40af" text-anchor="middle">Mobile Telemetry</text>
      <line x1="220" y1="140" x2="260" y2="140" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>
      
      <!-- Fork / Decision Diamond -->
      <polygon points="300,105 335,140 300,175 265,140" fill="#fef3c7" stroke="#d97706" stroke-width="1.5"/>
      <text x="300" y="144" font-family="Arial" font-size="8" font-weight="bold" fill="#78350f" text-anchor="middle">Check Risk</text>
      
      <!-- High Risk path (Upwards) -->
      <line x1="300" y1="105" x2="300" y2="60" stroke="#dc2626" stroke-width="1.5"/>
      <line x1="300" y1="60" x2="350" y2="60" stroke="#dc2626" stroke-width="1.5" marker-end="url(#arrow)"/>
      <text x="315" y="80" font-family="Arial" font-size="9.5" font-weight="bold" fill="#b91c1c">Score &ge; 35</text>
      
      <rect x="350" y="30" width="140" height="60" rx="8" fill="#fee2e2" stroke="#dc2626" stroke-width="1.5"/>
      <text x="420" y="57" font-family="Arial" font-size="9.5" font-weight="bold" fill="#991b1b" text-anchor="middle">Create Alert &</text>
      <text x="420" y="72" font-family="Arial" font-size="9" fill="#991b1b" text-anchor="middle">Trigger SOC Incident</text>
      
      <!-- Safe path (Rightwards) -->
      <line x1="335" y1="140" x2="390" y2="140" stroke="#16a34a" stroke-width="1.5" marker-end="url(#arrow)"/>
      <text x="360" y="132" font-family="Arial" font-size="9.5" font-weight="bold" fill="#15803d">Score &lt; 35</text>
      
      <rect x="390" y="115" width="100" height="50" rx="8" fill="#d1fae5" stroke="#059669" stroke-width="1.5"/>
      <text x="440" y="140" font-family="Arial" font-size="10" font-weight="bold" fill="#065f46" text-anchor="middle">Log Submissions</text>
      
      <!-- Join node -->
      <line x1="490" y1="60" x2="520" y2="60" stroke="#475569" stroke-width="1.5"/>
      <line x1="520" y1="60" x2="520" y2="140" stroke="#475569" stroke-width="1.5"/>
      <line x1="490" y1="140" x2="520" y2="140" stroke="#475569" stroke-width="1.5"/>
      
      <line x1="520" y1="140" x2="550" y2="140" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>
      
      <!-- End Circle (Double border) -->
      <circle cx="565" cy="140" r="10" fill="none" stroke="#000000" stroke-width="1.5"/>
      <circle cx="565" cy="140" r="5" fill="#000000"/>
    </svg>